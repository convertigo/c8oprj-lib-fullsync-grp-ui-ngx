  ↓CollectCandidateGroup [steps.SimpleStep-1781192407820]: 
    expression: |
      'var allGroupName = '''' + allGroup;
      var visibleGroup = allGroupName && allGroupName.indexOf(''C8Oreserved'') !== 0 && allGroupName.indexOf(''_C8O_HIDDEN'') !== 0;
      var availableGroup = visibleGroup && _assignedGroups.indexOf(allGroupName) === -1;
      var groupMatches = !_candidateGroupSearch || allGroupName.toLowerCase().indexOf(_candidateGroupSearch) !== -1;
      if (availableGroup && groupMatches) {
      	_candidateGroupTotal++;
      	if (_candidateGroups.length < _maxCandidateGroups) {
      		_candidateGroups.push(allGroupName);
      	}
      }'
