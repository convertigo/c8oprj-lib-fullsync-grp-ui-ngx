↓ParsePermission [steps.SimpleStep-1781192920243]: 
  comment: Parses an existing permission key or composes one from free project/action/scope fields for new permissions.
  expression: |
    'var _permissionFull = '''' + (permissionFull || '''');
    var _inputElement = '''' + (permissionElement || '''');
    var _inputAction = '''' + (permissionAction || '''');
    var _inputScope = '''' + (permissionScope || '''');
    var _permissionParts = _permissionFull.split('':'');
    var _permissionLeft = _permissionParts[0] || '''';
    var _permissionLastDot = _permissionLeft.lastIndexOf(''.'');
    var _parsedElement = _permissionLastDot >= 0 ? _permissionLeft.substring(0, _permissionLastDot) : _permissionLeft;
    var _parsedAction = _permissionLastDot >= 0 ? _permissionLeft.substring(_permissionLastDot + 1) : '''';
    var _parsedScope = _permissionParts[1] || '''';
    if (!_permissionFull) {
    	_parsedElement = _inputElement;
    	_parsedAction = _inputAction;
    	_parsedScope = _inputScope;
    }
    _parsedScope = _parsedScope == ''all'' ? ''all'' : ''own'';'
