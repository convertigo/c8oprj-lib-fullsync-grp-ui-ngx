  ↓PrepareDashboardUser [steps.SimpleStep-1781192762098]: 
    expression: |
      'var _dashboardRawUser = '''' + dashboardUserText;
      var _dashboardParts = _dashboardRawUser.split('':'');
      var _dashboardIsProvider = _dashboardParts.length >= 3 && ('''' + (_dashboardParts[2] || '''')).indexOf(''@'') !== -1;
      var _dashboardProvider = _dashboardIsProvider ? ('''' + (_dashboardParts[0] || '''')).toLowerCase() : '''';
      var _dashboardProviderIcons = {
      	google: ''logo-google'', github: ''logo-github'', facebook: ''logo-facebook'', apple: ''logo-apple'',
      	microsoft: ''logo-microsoft'', azure: ''logo-microsoft'', azuread: ''logo-microsoft'', twitter: ''logo-twitter'',
      	x: ''logo-twitter'', linkedin: ''logo-linkedin'', gitlab: ''logo-gitlab'', bitbucket: ''logo-bitbucket'',
      	amazon: ''logo-amazon'', yahoo: ''logo-yahoo'', slack: ''logo-slack'', discord: ''logo-discord'',
      	paypal: ''logo-paypal'', dropbox: ''logo-dropbox'', instagram: ''logo-instagram''
      };
      var _dashboardDisplayName = _dashboardIsProvider ? ('''' + (_dashboardParts[2] || '''')) : _dashboardRawUser;
      var _dashboardProviderIcon = _dashboardProviderIcons[_dashboardProvider] || ''key-outline'';
      var _dashboardProviderIconBlank = !_dashboardIsProvider;
      var _dashboardUserMatches = !_userSearch || (_dashboardRawUser + '' '' + _dashboardDisplayName).toLowerCase().indexOf(_userSearch) !== -1;
      if (_dashboardUserMatches) {
      	_dashboardUserTotal++;
      	if (_dashboardUsers.length < _maxUsers) {
      		_dashboardUsers.push({ name: _dashboardRawUser, displayName: _dashboardDisplayName, providerIcon: _dashboardProviderIcon, providerIconBlank: _dashboardProviderIconBlank, groups: dashboardUserGroups || ''0'', groupsLabel: (dashboardUserGroups || ''0'') + '' groupes'' });
      	}
      }'
