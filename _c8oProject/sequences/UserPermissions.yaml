      ↓MergePermission [steps.SimpleStep-1781165752775]: 
        expression: |
          'var splitPermission = currentPermission.split(":");
          if (splitPermission.length == 2) {
          	var resourceAction = splitPermission[0];
          	var scope = splitPermission[1];
          	var rank = scopePriorities[scope] || 0;
          	var current = effectivePermissions[resourceAction];
          	if (current == undefined || rank > current.rank) {
          		effectivePermissions[resourceAction] = {
          			scope: scope,
          			rank: rank
          		};
          	}
          }'
