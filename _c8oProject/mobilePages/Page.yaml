↓AdminPageStyle [ngx.components.UIStyle-1781106508520]: 
  comment: Administration page layout styles.
  styleContent: 
    - xmlizable: 
      - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
      - com.twinsoft.convertigo.beans.common.FormatedContent: 
        →: |
          '.admin-shell { display: grid; gap: 1rem; }
          .admin-hero { display: grid; gap: .75rem; padding: 1rem; border: 1px solid var(--ion-border-color); border-radius: 8px; background: var(--ion-card-background); }
          .admin-hero h1 { margin: 0; font-size: 1.55rem; font-weight: 700; letter-spacing: 0; }
          .admin-hero p { margin: 0; color: var(--ion-color-medium); max-width: 68rem; }
          .admin-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr)); gap: .75rem; }
          .admin-kpi { padding: .85rem; border: 1px solid var(--ion-border-color); border-radius: 8px; background: var(--ion-card-background); }
          .admin-kpi h2 { margin: 0; font-size: 1.8rem; line-height: 1; font-weight: 700; letter-spacing: 0; }
          .admin-kpi p { margin: .35rem 0 0; color: var(--ion-color-medium); font-size: .88rem; }
          .admin-grid { display: block; }
          .admin-grid ion-row { gap: .75rem; align-items: stretch; }
          .admin-grid ion-col { min-width: 18rem; }
          .admin-panel { position: relative; height: 100%; border: 1px solid var(--ion-border-color); border-radius: 8px; background: var(--ion-card-background); overflow: hidden; }
          .admin-panel ion-card-header { position: relative; min-height: 3.25rem; padding: .8rem 3.8rem .7rem .9rem; border-bottom: 1px solid var(--ion-border-color); }
          .admin-panel ion-card-header h2 { margin: 0; font-size: 1rem; font-weight: 650; letter-spacing: 0; line-height: 1.35; }
          .admin-panel ion-card-header .admin-count-badge { position: absolute; top: .65rem; right: .85rem; z-index: 1; }
          .admin-panel ion-list { background: transparent; padding: 0; margin: 0; }
          .admin-actions ion-button { margin: 0; min-height: 2.4rem; width: 100%; }
          .admin-empty { padding: .9rem; color: var(--ion-color-medium); }
          @media (max-width: 640px) { .admin-hero h1 { font-size: 1.25rem; } .admin-grid ion-col { min-width: 100%; } }'